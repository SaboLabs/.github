<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="s_glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="s_cyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>

  <!-- Inner hex border -->
  <polygon points="200,40 320,100 320,220 200,280 80,220 80,100"
           fill="none" stroke="url(#s_glow)" stroke-width="2" opacity="0.3"/>

  <!-- Shield shape -->
  <path d="M200,60 L300,110 L300,200 C300,260 250,290 200,310 C150,290 100,260 100,200 L100,110 Z"
        fill="none" stroke="url(#s_glow)" stroke-width="3" filter="url(#glow)"/>

  <!-- Lock/keyhole inside shield -->
  <circle cx="200" cy="175" r="30" fill="none" stroke="url(#s_cyan)" stroke-width="3"/>
  <circle cx="200" cy="165" r="15" fill="none" stroke="url(#s_cyan)" stroke-width="2.5"/>
  <rect x="195" y="175" width="10" height="25" rx="4" fill="url(#s_cyan)"/>

  <!-- Circuit lines -->
  <line x1="120" y1="130" x2="155" y2="155" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
  <circle cx="120" cy="130" r="3" fill="#22D3EE" opacity="0.6"/>
  <line x1="245" y1="155" x2="280" y2="130" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
  <circle cx="280" cy="130" r="3" fill="#22D3EE" opacity="0.6"/>

  <!-- Dots on hex vertices -->
  <circle cx="200" cy="40" r="4" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="320" cy="100" r="4" fill="#A855F7" opacity="0.5"/>
  <circle cx="320" cy="220" r="4" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="80" cy="100" r="4" fill="#A855F7" opacity="0.5"/>
  <circle cx="80" cy="220" r="4" fill="#8B5CF6" opacity="0.5"/>

  <!-- Text: SABOLABS -->
  <text x="200" y="355" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="32" font-weight="700" letter-spacing="6" fill="url(#s_glow)" filter="url(#glow)">
    SABOLABS
  </text>

  <!-- Tagline -->
  <text x="200" y="378" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="10" font-weight="400" letter-spacing="4" fill="#06B6D4" opacity="0.6">
    SECURITY · RESEARCH · AUTOMATION
  </text>
</svg>
